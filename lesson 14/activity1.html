<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
      <style>
body {
  background-color: #2d81d5;
}

.calculator {
  width: 650px;
  height: 550px;
  margin: 80px auto;
  padding: 30px;
  border-radius: 15px;
  background-color: #ff0000;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

#display {
  height: 70px;
  font-size: 26px;
  text-align: right;
  padding: 10px;
  margin-bottom: 15px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

button {
  font-size: 22px;
  border-radius: 10px;
}

  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="result" class="form-control" disabled>

  <div class="row g-2 mt-2">
    <div class="col-3"><button class="btn btn-secondary" onclick="clearResult()">C</button></div>
    <div class="col-3"><button class="btn btn-secondary" onclick="appendValue('/')">/</button></div>
    <div class="col-3"><button class="btn btn-secondary" onclick="appendValue('*')">*</button></div>
    <div class="col-3"><button class="btn btn-danger" onclick="deleteLast()">DEL</button></div>

    <div class="col-3"><button class="btn btn-light" onclick="appendValue('7')">7</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('8')">8</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('9')">9</button></div>
    <div class="col-3"><button class="btn btn-secondary" onclick="appendValue('-')">-</button></div>

    <div class="col-3"><button class="btn btn-light" onclick="appendValue('4')">4</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('5')">5</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('6')">6</button></div>
    <div class="col-3"><button class="btn btn-secondary" onclick="appendValue('+')">+</button></div>

    <div class="col-3"><button class="btn btn-light" onclick="appendValue('1')">1</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('2')">2</button></div>
    <div class="col-3"><button class="btn btn-light" onclick="appendValue('3')">3</button></div>
    <div class="col-3"><button class="btn btn-success" onclick="calculate()">=</button></div>

    <div class="col-6"><button class="btn btn-light" onclick="appendValue('0')">0</button></div>
    <div class="col-6"><button class="btn btn-light" onclick="appendValue('.')">.</button></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
